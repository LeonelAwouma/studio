<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design - WebGL Particle Morphing</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through except on interactive elements */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Carousel */
        .carousel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            pointer-events: auto;
        }

        .carousel-badge-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .carousel-arrow {
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s;
        }

        .carousel-arrow:hover {
            color: rgba(255, 255, 255, 1);
        }

        .carousel-badge {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            padding: 6px 20px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: opacity 0.4s ease-in-out;
            min-width: 200px;
            text-align: center;
        }

        .carousel-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-style: italic;
            margin-top: 10px;
            transition: opacity 0.4s ease-in-out;
        }

        /* Fade animation classes */
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }

        /* Bottom Gradient */
        .ground-plane {
            height: 80px;
            background: linear-gradient(to top, rgba(0, 40, 10, 0.5), transparent);
            width: 100%;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div class="carousel-container">
        <div class="carousel-badge-wrapper">
            <div class="carousel-arrow" id="prev-btn">‹</div>
            <div class="carousel-badge" id="state-label">ANALYZE</div>
            <div class="carousel-arrow" id="next-btn">›</div>
        </div>
        <div class="carousel-subtitle" id="state-subtitle">Data processing & interpretation</div>
    </div>
    <div class="ground-plane"></div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- OrbitControls -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<!-- Simplex Noise -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

<script>
    // --- Configurations ---
    const PARTICLE_COUNT = 12000;
    const STAR_COUNT = 2000;
    const LERP_SPEED = 0.045;
    const COLOR_LERP = 0.03;
    const STATE_DURATION = 8000; // ms (Slowed down from 3500)
    const TRANSITION_DURATION = 1500; // ms
    
    // --- State Definitions ---
    const STATES = [
        { name: "ANALYZE", subtitle: "Data processing & interpretation", type: "text" },
        { name: "STRUCTURE", subtitle: "Architectural volume mapping", type: "cube" },
        { name: "EXPANSION", subtitle: "Chaotic outward dispersion", type: "explosion" },
        { name: "FOCUS", subtitle: "Hierarchical data convergence", type: "pyramid" },
        { name: "GLOBAL", subtitle: "Omnidirectional network topology", type: "sphere" }
    ];

    let currentStateIndex = 0;
    let time = 0;
    let stateTimer = 0;
    let isTransitioning = false;
    let explosionTimer = 0;

    // --- Setup Three.js ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    // Pitch black background is default, but let's be explicit
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
    camera.position.z = 350;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;

    const simplex = new SimplexNoise();

    // --- Fog / Ambient Glow Sprite ---
    function createGlowTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        gradient.addColorStop(0, 'rgba(0, 80, 30, 0.12)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);
        const texture = new THREE.CanvasTexture(canvas);
        return texture;
    }

    const fogSpriteMaterial = new THREE.SpriteMaterial({
        map: createGlowTexture(),
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const fogSprite = new THREE.Sprite(fogSpriteMaterial);
    fogSprite.scale.set(800, 800, 1);
    fogSprite.position.z = -100;
    scene.add(fogSprite);

    // --- Starfield (Static) ---
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
        starPositions[i * 3] = (Math.random() - 0.5) * 2000;
        starPositions[i * 3 + 1] = (Math.random() - 0.5) * 2000;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 2000 - 500; // Push back slightly
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.5,
        transparent: true,
        opacity: 0.2,
        sizeAttenuation: true
    });
    const starSystem = new THREE.Points(starGeometry, starMaterial);
    scene.add(starSystem);

    // --- Main Particle System ---
    // Arrays for attributes
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const targetColors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const velocities = new Float32Array(PARTICLE_COUNT * 3); // For explosion and repulsion
    const randomOffsets = new Float32Array(PARTICLE_COUNT * 3); // For turbulence

    // Initialize arrays
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        // Start randomly scattered
        positions[i * 3] = (Math.random() - 0.5) * 500;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 500;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 500;
        
        targetPositions[i * 3] = positions[i * 3];
        targetPositions[i * 3 + 1] = positions[i * 3 + 1];
        targetPositions[i * 3 + 2] = positions[i * 3 + 2];

        // Size: 1.2px to 2.5px
        sizes[i] = 1.2 + Math.random() * 1.3;

        // Base random offset for noise
        randomOffsets[i * 3] = Math.random() * 100;
        randomOffsets[i * 3 + 1] = Math.random() * 100;
        randomOffsets[i * 3 + 2] = Math.random() * 100;

        colors[i * 3] = 1; colors[i * 3 + 1] = 1; colors[i * 3 + 2] = 1;
        targetColors[i * 3] = 1; targetColors[i * 3 + 1] = 1; targetColors[i * 3 + 2] = 1;
        
        velocities[i*3] = 0; velocities[i*3+1] = 0; velocities[i*3+2] = 0;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    // We need a custom shader to support per-particle sizing if we want varying sizes
    // But standard PointsMaterial doesn't support varying sizes via attribute natively in basic setup without custom shader.
    // The prompt says: "size between 1.2px and 2.5px, with sizeAttenuation: true... random size variation".
    // We will use ShaderMaterial to support all requirements perfectly.
    
    const vertexShader = `
        attribute float size;
        attribute vec3 color;
        varying vec3 vColor;
        void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (300.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `;

    const fragmentShader = `
        varying vec3 vColor;
        void main() {
            // Circular particle
            float d = distance(gl_PointCoord, vec2(0.5));
            if (d > 0.5) discard;
            // Soft edge
            float alpha = smoothstep(0.5, 0.1, d);
            gl_FragColor = vec4(vColor, alpha);
        }
    `;

    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const material = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    // --- Bloom Clone (Ambient Glow) ---
    // Rendering the system twice: once full, once 60% scale, 0.25 opacity
    const bloomMaterial = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: `
            varying vec3 vColor;
            void main() {
                float d = distance(gl_PointCoord, vec2(0.5));
                if (d > 0.5) discard;
                float alpha = smoothstep(0.5, 0.0, d) * 0.25;
                gl_FragColor = vec4(vColor, alpha);
            }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    const bloomSystem = new THREE.Points(geometry, bloomMaterial);
    bloomSystem.scale.set(0.6, 0.6, 0.6);
    scene.add(bloomSystem);

    // --- Helper Functions for Shape Generation ---

    // 1. TEXT "Analyze"
    let textCoordinates = [];
    function generateTextCoords() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 300;
        
        ctx.fillStyle = 'black';
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        ctx.font = 'bold 120px sans-serif';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Analyze', canvas.width/2, canvas.height/2);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const coords = [];
        
        for (let y = 0; y < canvas.height; y += 2) {
            for (let x = 0; x < canvas.width; x += 2) {
                const alpha = imgData[(y * canvas.width + x) * 4 + 0]; // using R channel since it's white
                if (alpha > 128) {
                    coords.push({
                        x: x - canvas.width/2,
                        y: -(y - canvas.height/2),
                        z: (Math.random() - 0.5) * 10
                    });
                }
            }
        }
        return coords;
    }
    textCoordinates = generateTextCoords();

    // 5. Fibonacci Sphere
    function getFibonacciSpherePoint(i, n, radius) {
        const phi = Math.acos(1 - 2 * (i + 0.5) / n);
        const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
        return {
            x: radius * Math.cos(theta) * Math.sin(phi),
            y: radius * Math.sin(theta) * Math.sin(phi),
            z: radius * Math.cos(phi)
        };
    }

    // Color Lerp utility
    function lerpColor(color1, color2, factor) {
        const c1 = new THREE.Color(color1);
        const c2 = new THREE.Color(color2);
        return c1.lerp(c2, factor);
    }

    // --- Morphing Logic ---
    function triggerState(index) {
        currentStateIndex = index;
        const state = STATES[index];
        updateUI(state);
        
        const c1 = new THREE.Color();
        const c2 = new THREE.Color();
        let targetC = new THREE.Color();

        // Specific state setup
        if (state.type === 'explosion') {
            explosionTimer = 2000; // Lasts 2 seconds
        } else {
            explosionTimer = 0;
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Reset velocities unless explosion
            if (state.type !== 'explosion') {
                velocities[i*3] = 0;
                velocities[i*3+1] = 0;
                velocities[i*3+2] = 0;
            }

            if (state.type === 'text') {
                const coord = textCoordinates[i % textCoordinates.length];
                targetPositions[i*3] = coord.x * 0.8;
                targetPositions[i*3+1] = coord.y * 0.8;
                targetPositions[i*3+2] = coord.z;
                
                // Color: #3A00FF to #8B00FF based on x
                const factor = (targetPositions[i*3] + 300) / 600;
                targetC = lerpColor(0x3A00FF, 0x8B00FF, Math.max(0, Math.min(1, factor)));

            } else if (state.type === 'cube') {
                const face = Math.floor(Math.random() * 6);
                const u = (Math.random() - 0.5) * 150;
                const v = (Math.random() - 0.5) * 150;
                const depth = 75 + (Math.random() - 0.5) * 6; // ±3 variation
                
                let x, y, z;
                if (face === 0) { x = depth; y = u; z = v; }
                else if (face === 1) { x = -depth; y = u; z = v; }
                else if (face === 2) { x = u; y = depth; z = v; }
                else if (face === 3) { x = u; y = -depth; z = v; }
                else if (face === 4) { x = u; y = v; z = depth; }
                else { x = u; y = v; z = -depth; }
                
                targetPositions[i*3] = x;
                targetPositions[i*3+1] = y;
                targetPositions[i*3+2] = z;

                // Color: #00FF88 to #AAFF00 based on y
                const factor = (y + 75) / 150;
                targetC = lerpColor(0x00FF88, 0xAAFF00, Math.max(0, Math.min(1, factor)));

            } else if (state.type === 'explosion') {
                // Spherical explosion target
                const r = 250 + Math.random() * 100;
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                
                targetPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i*3+2] = r * Math.cos(phi);

                // Initial velocity vector
                velocities[i*3] = (targetPositions[i*3] - positions[i*3]) * 0.05;
                velocities[i*3+1] = (targetPositions[i*3+1] - positions[i*3+1]) * 0.05;
                velocities[i*3+2] = (targetPositions[i*3+2] - positions[i*3+2]) * 0.05;

                // Color: #00FF88 -> #CCFF00 -> #FFD700
                const rand = Math.random();
                if (rand < 0.33) targetC.setHex(0x00FF88);
                else if (rand < 0.66) targetC.setHex(0xCCFF00);
                else targetC.setHex(0xFFD700);

            } else if (state.type === 'pyramid') {
                // Math to distribute on tetrahedron
                const h = 120;
                const vertices = [
                    new THREE.Vector3(0, h, 0),
                    new THREE.Vector3(h*0.94, -h*0.33, h*0.47),
                    new THREE.Vector3(-h*0.94, -h*0.33, h*0.47),
                    new THREE.Vector3(0, -h*0.33, -h*0.94)
                ];
                
                // Halo ring logic (approx 10% of particles)
                if (i < PARTICLE_COUNT * 0.1) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 140 + Math.random() * 10;
                    targetPositions[i*3] = Math.cos(angle) * r;
                    targetPositions[i*3+1] = 0; // Equator
                    targetPositions[i*3+2] = Math.sin(angle) * r;
                    targetC.setHex(0xFFFFFF); // Halo is bright
                } else {
                    const face = Math.floor(Math.random() * 4);
                    const v1 = vertices[face];
                    const v2 = vertices[(face+1)%4];
                    const v3 = vertices[(face+2)%4];
                    
                    let r1 = Math.random();
                    let r2 = Math.random();
                    if(r1 + r2 > 1) { r1 = 1 - r1; r2 = 1 - r2; }
                    
                    const p = new THREE.Vector3()
                        .addScaledVector(v1, 1 - r1 - r2)
                        .addScaledVector(v2, r1)
                        .addScaledVector(v3, r2);
                        
                    targetPositions[i*3] = p.x;
                    targetPositions[i*3+1] = p.y;
                    targetPositions[i*3+2] = p.z;
                    
                    // Color: #FF8C00 to #FFD700 based on height
                    const factor = (p.y + h*0.33) / (h*1.33);
                    targetC = lerpColor(0xFF8C00, 0xFFD700, Math.max(0, Math.min(1, factor)));
                }

            } else if (state.type === 'sphere') {
                const pt = getFibonacciSpherePoint(i, PARTICLE_COUNT, 140);
                targetPositions[i*3] = pt.x;
                targetPositions[i*3+1] = pt.y;
                targetPositions[i*3+2] = pt.z;

                // Color: #00FFFF to #0088FF based on latitude (y)
                const factor = (pt.y + 140) / 280;
                targetC = lerpColor(0x00FFFF, 0x0088FF, Math.max(0, Math.min(1, factor)));
            }

            targetColors[i*3] = targetC.r;
            targetColors[i*3+1] = targetC.g;
            targetColors[i*3+2] = targetC.b;
        }
    }

    // --- UI Updates ---
    const labelEl = document.getElementById('state-label');
    const subtitleEl = document.getElementById('state-subtitle');

    function updateUI(state) {
        labelEl.classList.remove('fade-in');
        labelEl.classList.add('fade-out');
        subtitleEl.classList.remove('fade-in');
        subtitleEl.classList.add('fade-out');
        
        setTimeout(() => {
            labelEl.innerText = state.name;
            subtitleEl.innerText = state.subtitle;
            labelEl.classList.remove('fade-out');
            labelEl.classList.add('fade-in');
            subtitleEl.classList.remove('fade-out');
            subtitleEl.classList.add('fade-in');
        }, 400);
    }

    // --- Interactivity ---
    const mouse = new THREE.Vector2(-1000, -1000); // Start offscreen
    const raycaster = new THREE.Raycaster();
    const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const mouseWorld = new THREE.Vector3();

    window.addEventListener('mousemove', (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        raycaster.ray.intersectPlane(plane, mouseWorld);
    });

    function nextState() {
        let next = (currentStateIndex + 1) % STATES.length;
        triggerState(next);
        stateTimer = 0; // Reset timer
    }

    function prevState() {
        let prev = (currentStateIndex - 1 + STATES.length) % STATES.length;
        triggerState(prev);
        stateTimer = 0; // Reset timer
    }

    document.getElementById('next-btn').addEventListener('click', nextState);
    document.getElementById('prev-btn').addEventListener('click', prevState);


    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        
        controls.update(); // Required if controls.enableDamping is true

        const delta = clock.getDelta();
        time += delta;

        // Global slow motion
        particleSystem.rotation.y += 0.001;
        particleSystem.rotation.z += 0.0005;
        bloomSystem.rotation.y += 0.001;
        bloomSystem.rotation.z += 0.0005;

        const isExplosion = STATES[currentStateIndex].type === 'explosion';
        const isSphere = STATES[currentStateIndex].type === 'sphere';
        const isPyramid = STATES[currentStateIndex].type === 'pyramid';
        
        const turbulenceScale = isExplosion ? 25.0 : 8.0;

        const posAttr = particleSystem.geometry.attributes.position;
        const colAttr = particleSystem.geometry.attributes.color;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let px = positions[i*3];
            let py = positions[i*3+1];
            let pz = positions[i*3+2];
            
            let tx = targetPositions[i*3];
            let ty = targetPositions[i*3+1];
            let tz = targetPositions[i*3+2];

            // Sphere continuous rotation (apply to target)
            if (isSphere) {
                const angle = 0.003;
                const newX = tx * Math.cos(angle) - tz * Math.sin(angle);
                const newZ = tx * Math.sin(angle) + tz * Math.cos(angle);
                tx = newX;
                tz = newZ;
                targetPositions[i*3] = tx;
                targetPositions[i*3+2] = tz;
            }
            
            // Pyramid halo rotation
            if (isPyramid && i < PARTICLE_COUNT * 0.1) {
                const angle = 0.01;
                const newX = tx * Math.cos(angle) - tz * Math.sin(angle);
                const newZ = tx * Math.sin(angle) + tz * Math.cos(angle);
                // add slight wave
                const newY = Math.sin(time * 2 + i * 0.1) * 5;
                tx = newX;
                ty = newY;
                tz = newZ;
                targetPositions[i*3] = tx;
                targetPositions[i*3+1] = ty;
                targetPositions[i*3+2] = tz;
            }

            // Simplex Noise Turbulence
            const rx = randomOffsets[i*3];
            const ry = randomOffsets[i*3+1];
            const rz = randomOffsets[i*3+2];
            
            const noiseX = simplex.noise3D(px * 0.003 + rx, py * 0.003, time * 0.4) * turbulenceScale;
            const noiseY = simplex.noise3D(px * 0.003, py * 0.003 + ry, time * 0.4) * turbulenceScale;
            const noiseZ = simplex.noise3D(px * 0.003, py * 0.003, time * 0.4 + rz) * turbulenceScale;

            // Target with noise
            let fTx = tx + noiseX;
            let fTy = ty + noiseY;
            let fTz = tz + noiseZ;

            // Explosion logic
            if (isExplosion) {
                // Decelerate
                velocities[i*3] *= 0.95;
                velocities[i*3+1] *= 0.95;
                velocities[i*3+2] *= 0.95;
                
                fTx += velocities[i*3] * 10;
                fTy += velocities[i*3+1] * 10;
                fTz += velocities[i*3+2] * 10;
            }

            // Mouse Repulsion
            const dx = px - mouseWorld.x;
            const dy = py - mouseWorld.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 80) {
                const force = (1 - dist/80) * 15.0;
                velocities[i*3] += (dx/dist) * force;
                velocities[i*3+1] += (dy/dist) * force;
            }
            
            // Apply velocities (mostly for repulsion decay)
            px += velocities[i*3];
            py += velocities[i*3+1];
            pz += velocities[i*3+2];
            
            // Decay velocities
            velocities[i*3] *= 0.9;
            velocities[i*3+1] *= 0.9;
            velocities[i*3+2] *= 0.9;

            // Lerp Position
            px += (fTx - px) * LERP_SPEED;
            py += (fTy - py) * LERP_SPEED;
            pz += (fTz - pz) * LERP_SPEED;

            positions[i*3] = px;
            positions[i*3+1] = py;
            positions[i*3+2] = pz;

            // Color Lerp
            colAttr.array[i*3] += (targetColors[i*3] - colAttr.array[i*3]) * COLOR_LERP;
            colAttr.array[i*3+1] += (targetColors[i*3+1] - colAttr.array[i*3+1]) * COLOR_LERP;
            colAttr.array[i*3+2] += (targetColors[i*3+2] - colAttr.array[i*3+2]) * COLOR_LERP;
        }

        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    triggerState(0);
    animate();

</script>
</body>
</html>
